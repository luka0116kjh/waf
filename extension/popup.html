<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroScan Settings</title>
    <style>
        body {
            width: 290px;
            margin: 0;
            padding: 18px;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
            color: #e5e7eb;
        }

        h1 {
            margin: 0;
            font-size: 18px;
        }

        p {
            margin: 8px 0 0;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }

        .panel {
            margin-top: 16px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .option {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: flex-start;
        }

        .option label {
            font-size: 13px;
            font-weight: 600;
        }

        .hint {
            display: block;
            margin-top: 4px;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.45;
        }

        .meta {
            margin-top: 12px;
            color: #cbd5e1;
            font-size: 12px;
        }

        .status {
            margin-top: 14px;
            min-height: 18px;
            color: #fca5a5;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>ZeroScan Sentinel</h1>
    <p>기본값은 알림 모드입니다. 차단 모드를 켜면 위험 페이지를 전용 차단 화면으로 넘깁니다.</p>

    <section class="panel">
        <div class="option">
            <input type="radio" id="modeAlert" name="mode" value="alert">
            <div>
                <label for="modeAlert">알림 모드</label>
                <span class="hint">페이지는 열어 두고 상단 배너만 표시합니다.</span>
            </div>
        </div>
        <div class="option">
            <input type="radio" id="modeBlock" name="mode" value="block">
            <div>
                <label for="modeBlock">차단 모드</label>
                <span class="hint">위험 판정 시 차단 페이지로 전환합니다.</span>
            </div>
        </div>
        <div class="meta" id="allowedDomainsInfo">허용된 도메인: 0개</div>
        <div class="status" id="statusText"></div>
    </section>

    <script src="popup.js"></script>
</body>
</html>
